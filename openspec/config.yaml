context: |
  Tech stack: C#, Razor Pages, ASP.NET Core
  Integration: Official YNAB API
  Purpose: Display financial reports and data visualization
  Conventions: C# naming standards, dependency injection, async/await patterns
  Domain: Personal finance management and reporting

rules:
  tasks:
    - Break tasks into chunks of max 2 hours
    - Include API integration steps
  proposal:
    - Keep proposals under 500 words
    - Include data models for YNAB entities
